name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks v8.21.2
        run: |
          set -euo pipefail
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run gitleaks
        id: gitleaks_scan
        continue-on-error: true
        run: |
          set -euo pipefail
          gitleaks detect --source . --verbose --redact --log-opts="--all" --report-format json --report-path gitleaks-report.json

      - name: Prepare gitleaks PR comment
        if: steps.gitleaks_scan.outcome == 'failure'
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          marker = "<!-- openhermes-secret-scan:gitleaks -->"
          report_path = Path("gitleaks-report.json")
          findings = json.loads(report_path.read_text()) if report_path.exists() else []

          lines = [
              marker,
              "## Secret scan failed: gitleaks",
              "",
              "Gitleaks detected redacted secret-like material in repository history.",
              "",
              "| File | Rule | Commit |",
              "| --- | --- | --- |",
          ]
          for finding in findings[:20]:
              lines.append(
                  f"| `{finding.get('File', 'unknown')}` | `{finding.get('RuleID', 'unknown')}` | `{finding.get('Commit', 'working-tree')[:12]}` |"
              )
          if len(findings) > 20:
              lines.append(f"| `...` | `{len(findings) - 20} additional finding(s)` | `...` |")

          lines.extend(
              [
                  "",
                  "Remediation:",
                  "1. Rotate the exposed credential or secret.",
                  "2. Purge it from history with `git filter-repo` or an equivalent history rewrite.",
                  "3. Force-push the cleaned history.",
                  "4. Review `docs/governance/SECRETS.md` for the repository runbook.",
              ]
          )

          Path("gitleaks-comment.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Publish gitleaks PR comment
        if: steps.gitleaks_scan.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('gitleaks-comment.md', 'utf8');
            const marker = '<!-- openhermes-secret-scan:gitleaks -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail if gitleaks found issues
        if: steps.gitleaks_scan.outcome == 'failure'
        run: exit 1

  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install detect-secrets v1.5.0
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install detect-secrets==1.5.0

      - name: Run detect-secrets baseline check
        id: detect_secrets_scan
        continue-on-error: true
        run: |
          set -euo pipefail
          detect-secrets scan --baseline .secrets.baseline
          detect-secrets scan --all-files > current-secrets.baseline
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          old = json.loads(Path(".secrets.baseline").read_text(encoding="utf-8"))
          new = json.loads(Path("current-secrets.baseline").read_text(encoding="utf-8"))

          def signature(entry):
              return (
                  entry.get("type"),
                  entry.get("hashed_secret"),
                  entry.get("line_number"),
              )

          old_results = {
              path: {signature(item) for item in entries}
              for path, entries in old.get("results", {}).items()
          }

          new_findings = []
          for path, entries in sorted(new.get("results", {}).items()):
              for entry in entries:
                  if signature(entry) not in old_results.get(path, set()):
                      new_findings.append(
                          {
                              "file": path,
                              "type": entry.get("type", "unknown"),
                              "line": entry.get("line_number", "?"),
                          }
                      )

          marker = "<!-- openhermes-secret-scan:detect-secrets -->"
          lines = [
              marker,
              "## Secret scan failed: detect-secrets",
              "",
          ]

          if new_findings:
              lines.extend(
                  [
                      "New working-tree detections were found that are not present in `.secrets.baseline`.",
                      "",
                      "| File | Detector | Line |",
                      "| --- | --- | --- |",
                  ]
              )
              for finding in new_findings[:20]:
                  lines.append(
                      f"| `{finding['file']}` | `{finding['type']}` | `{finding['line']}` |"
                  )
              if len(new_findings) > 20:
                  lines.append(
                      f"| `...` | `{len(new_findings) - 20} additional finding(s)` | `...` |"
                  )
              lines.extend(
                  [
                      "",
                      "Either remove the secret material or audit the committed baseline if the finding is a verified false positive.",
                      "Review `docs/governance/SECRETS.md` before updating `.secrets.baseline`.",
                  ]
              )
              Path("detect-secrets-comment.md").write_text(
                  "\n".join(lines) + "\n",
                  encoding="utf-8",
              )
              sys.exit(1)

          lines.append("No new findings beyond the committed baseline were detected.")
          Path("detect-secrets-comment.md").write_text(
              "\n".join(lines) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Publish detect-secrets PR comment
        if: steps.detect_secrets_scan.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('detect-secrets-comment.md', 'utf8');
            const marker = '<!-- openhermes-secret-scan:detect-secrets -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail if detect-secrets found new issues
        if: steps.detect_secrets_scan.outcome == 'failure'
        run: exit 1
