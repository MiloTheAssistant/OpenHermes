services:
  elon:
    build:
      context: ../../../OpenClawMaster
    container_name: elon
    networks:
      - openhermes_internal
    volumes:
      - ../../workspace:/workspace:ro
      - ../env/elon.env:/etc/elon/env:ro
    ports:
      - 127.0.0.1:18789:18789
    restart: unless-stopped

  milo:
    build:
      context: ../../../hermes-agent
    container_name: milo
    depends_on:
      - elon
    networks:
      - openhermes_internal
      - openhermes_edge
    volumes:
      - ../../workspace:/workspace:rw
      - ../env/milo.env:/etc/milo/env:ro
    ports:
      - 127.0.0.1:8787:8787
    restart: unless-stopped

  reverse_proxy:
    image: caddy:2
    container_name: openhermes_proxy
    depends_on:
      - milo
    networks:
      - openhermes_edge
    environment:
      OPENHERMES_DOMAIN: ${OPENHERMES_DOMAIN:-openhermes.example.com}
      OPENHERMES_EDGE_TOKEN: ${OPENHERMES_EDGE_TOKEN:-replace-me}
    ports:
      - 443:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

networks:
  openhermes_internal:
    driver: bridge
    internal: true
  openhermes_edge:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
