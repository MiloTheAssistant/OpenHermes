# Command Center — Channel Configuration
# Defines approved distribution channels and posting policy.
# Referenced by: workflows.yaml, AGENTS.md, GotchaFramework.md

channels:
  discord:
    enabled: true
    posting_mode: standing_approved
    servers:
      milos_world:
        name: "Milo's World"
        channels:
          dfb:
            name: "#dfb"
            approved_workflows: [Daily_Financial_Briefing]
            approved_agents: [Hermes]

  telegram:
    enabled: true
    posting_mode: standing_approved
    targets:
      milo_dm:
        type: direct_message
        approved_for: [heartbeat, key_health, milo_notifications]
      alerts:
        type: group
        approved_for: [Daily_Financial_Briefing, system_alerts]

  x:
    enabled: false  # API pending — manual only per DEC-004
    posting_mode: manual_only
    approval_required: per_post
    approved_agents: [Hermes]  # Phase 5: Hermes absorbed Zuck's social distribution role

  email:
    enabled: true
    posting_mode: manual_only
    approved_agents: [Hermes]
    note: "Hermes drafts — John sends. Always."

policy:
  default_mode: manual_only
  standing_approval_requires: milo_policy_approval
  sentinel_review: conditional
  emergency_halt: true
